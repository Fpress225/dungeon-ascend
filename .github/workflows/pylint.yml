name: Pylint

on:
  pull_request:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pylint
        run: |
          python -m pip install --upgrade pip
          pip install pylint

      - name: Analyse Python files
        run: |
          pylint $(git ls-files '*.py') --output=lint.txt || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lint.txt
          path: lint.txt